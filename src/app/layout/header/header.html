<header class="header">
  <div class="promo-banner">
    <p>{{ promoBanner }}</p>
  </div>
  <nav class="navbar">
    <div class="container">
      <div class="navbar-brand">
        <a routerLink="/" class="brand-logo">
          <span class="logo-text">{{ brandName }}</span>
        </a>
      </div>
      
      <!-- Desktop Menu -->
      <ul class="navbar-menu desktop-menu">
        <li class="nav-item" *ngFor="let item of menuItems">
          <a [routerLink]="item.route" class="nav-link">{{ item.label }}</a>
        </li>
      </ul>
      
      <div class="navbar-actions">
        <!-- Desktop Icons -->
        <button class="icon-btn desktop-icon" aria-label="Buscar">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
        </button>
        
        @if (isAuthenticated()) {
          @if (isAdmin()) {
            <a routerLink="/admin" class="icon-btn desktop-icon" aria-label="Admin" title="Panel Admin">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7"></rect>
                <rect x="14" y="3" width="7" height="7"></rect>
                <rect x="14" y="14" width="7" height="7"></rect>
                <rect x="3" y="14" width="7" height="7"></rect>
              </svg>
            </a>
          }
          <button class="icon-btn desktop-icon" aria-label="Usuario" title="{{ user()?.name }}">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </button>
        } @else {
          <a routerLink="/login" class="icon-btn desktop-icon" aria-label="Iniciar sesión" title="Iniciar sesión">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
              <polyline points="10 17 15 12 10 7"></polyline>
              <line x1="15" y1="12" x2="3" y2="12"></line>
            </svg>
          </a>
        }
        
        <button class="icon-btn cart-btn" aria-label="Carrito">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 2h6v2H9z"></path>
            <path d="M9 22a1 1 0 1 0 0-2 1 1 0 0 0 0 2ZM19 22a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z"></path>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
          @if (cartItemCount() > 0) {
            <span class="cart-badge">{{ cartItemCount() }}</span>
          }
        </button>
        
        <!-- Hamburger Button (Mobile Only) -->
        <button 
          class="hamburger-btn mobile-only" 
          aria-label="Menú"
          (click)="toggleMobileMenu()">
          <svg 
            *ngIf="!mobileMenuOpen()" 
            xmlns="http://www.w3.org/2000/svg" 
            width="24" 
            height="24" 
            viewBox="0 0 24 24" 
            fill="none" 
            stroke="currentColor" 
            stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
          <svg 
            *ngIf="mobileMenuOpen()" 
            xmlns="http://www.w3.org/2000/svg" 
            width="24" 
            height="24" 
            viewBox="0 0 24 24" 
            fill="none" 
            stroke="currentColor" 
            stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
    </div>
  </nav>
  
  <!-- Mobile Menu -->
  <div class="mobile-menu" [class.open]="mobileMenuOpen()">
    <ul class="mobile-menu-list">
      <li class="mobile-nav-item" *ngFor="let item of menuItems">
        <a 
          [routerLink]="item.route" 
          class="mobile-nav-link"
          (click)="closeMobileMenu()">
          {{ item.label }}
        </a>
      </li>
      @if (isAuthenticated()) {
        @if (isAdmin()) {
          <li class="mobile-nav-item">
            <a 
              routerLink="/admin" 
              class="mobile-nav-link"
              (click)="closeMobileMenu()">
              Panel Admin
            </a>
          </li>
        }
        <li class="mobile-nav-item">
          <button class="mobile-nav-link logout-btn" (click)="logout()">
            Cerrar Sesión
          </button>
        </li>
      } @else {
        <li class="mobile-nav-item">
          <a 
            routerLink="/login" 
            class="mobile-nav-link"
            (click)="closeMobileMenu()">
            Iniciar Sesión
          </a>
        </li>
        <li class="mobile-nav-item">
          <a 
            routerLink="/register" 
            class="mobile-nav-link"
            (click)="closeMobileMenu()">
            Registrarse
          </a>
        </li>
      }
    </ul>
  </div>
  
  <!-- Overlay -->
  <div 
    class="mobile-overlay" 
    [class.visible]="mobileMenuOpen()"
    (click)="closeMobileMenu()">
  </div>
</header>
