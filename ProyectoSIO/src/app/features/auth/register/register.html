<div class="register-page">
  <div class="register-container">
    <div class="register-card">
      <!-- Logo/Brand -->
      <div class="brand">
        <h1>Crear Cuenta</h1>
        <p>Regístrate para comenzar a comprar</p>
      </div>

      <!-- Error message -->
      @if (errorMessage()) {
        <div class="error-alert">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          {{ errorMessage() }}
        </div>
      }

      <!-- Register Form -->
      <form (ngSubmit)="onSubmit()" class="register-form">
        <div class="form-group">
          <label for="name">Nombre completo</label>
          <input
            type="text"
            id="name"
            [value]="formData().name"
            (input)="updateName($any($event.target).value)"
            placeholder="Tu nombre"
            required
            autocomplete="name">
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            [value]="formData().email"
            (input)="updateEmail($any($event.target).value)"
            placeholder="tu@email.com"
            required
            autocomplete="email">
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="password-input">
            <input
              [type]="showPassword() ? 'text' : 'password'"
              id="password"
              [value]="formData().password"
              (input)="updatePassword($any($event.target).value)"
              placeholder="Mínimo 6 caracteres"
              required
              autocomplete="new-password">
            <button 
              type="button" 
              class="toggle-password"
              (click)="togglePasswordVisibility()">
              @if (showPassword()) {
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                  <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>
              } @else {
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              }
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirmar contraseña</label>
          <div class="password-input">
            <input
              [type]="showConfirmPassword() ? 'text' : 'password'"
              id="confirmPassword"
              [value]="confirmPassword()"
              (input)="confirmPassword.set($any($event.target).value)"
              placeholder="Repite tu contraseña"
              required
              autocomplete="new-password">
            <button 
              type="button" 
              class="toggle-password"
              (click)="toggleConfirmPasswordVisibility()">
              @if (showConfirmPassword()) {
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                  <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>
              } @else {
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              }
            </button>
          </div>
        </div>

        <button 
          type="submit" 
          class="submit-btn"
          [disabled]="isLoading()">
          @if (isLoading()) {
            <span class="spinner"></span>
            Creando cuenta...
          } @else {
            Crear Cuenta
          }
        </button>
      </form>

      <!-- Login link -->
      <div class="login-link">
        <p>¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión aquí</a></p>
      </div>

      <!-- Back to home -->
      <div class="back-link">
        <a routerLink="/home">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
          Volver al inicio
        </a>
      </div>
    </div>
  </div>
</div>
